<link rel="stylesheet" href="styles/tokens.css">
</head>
<body>
  <div id="root"></div>

  <!-- Data -->
  <script src="data/sample.js?v=3"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin="anonymous"></script>

  <!-- Components -->
  <script type="text/babel" src="components/Icon.jsx"></script>
  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/Chrome.jsx"></script>
  <script type="text/babel" src="components/HeroToday.jsx"></script>
  <script type="text/babel" src="components/Widgets.jsx"></script>

  <!-- Firebase 연동 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbiRluC-sF36GKyCDzwuCQv49ZyFodS1s",
      authDomain: "fafa-s01.firebaseapp.com",
      projectId: "fafa-s01",
      storageBucket: "fafa-s01.firebasestorage.app",
      messagingSenderId: "958168565570",
      appId: "1:958168565570:web:e629e17de303bc031c2adb",
      measurementId: "G-09E2SLW9ZF"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      window.firebaseApp = app;
      window.firebaseConfig = firebaseConfig;
      window.firebaseDb = db;
      console.log("[PAPA] Firebase 초기화 완료:", app.options.projectId);

      // Analytics는 일부 미리보기/샌드박스 환경에서 차단될 수 있어 안전하게 시도
      try {
        const { getAnalytics, isSupported } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js");
        if (await isSupported()) {
          window.firebaseAnalytics = getAnalytics(app);
          console.log("[PAPA] Firebase Analytics 활성화");
        } else {
          console.log("[PAPA] 이 환경에서는 Analytics 미지원 — 건너뜀");
        }
      } catch (e) {
        console.warn("[PAPA] Analytics 초기화 건너뜀:", e?.message || e);
      }
    } catch (e) {
      console.warn("[PAPA] Firebase 초기화 실패:", e?.message || e);
    }
  </script>
</body>
</html>
